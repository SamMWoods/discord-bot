server:
  port: 2333

lavalink:
  server:
    password: ${LAVALINK_PASSWORD}
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

logging:
  level:
    root: INFO
    lavalink: INFO
