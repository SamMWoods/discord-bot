server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"

    # Disable built-in YouTube, plugin handles it
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true

    oauth:
      enabled: true
      refreshToken: "${LAVALINK_YT_REFRESH_TOKEN}"

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Put OAuth-friendly clients first, and REMOVE ANDROID (it’s broken per your logs)
    clients:
      - TVHTML5_SIMPLY_EMBEDDED_PLAYER
      - WEB
      - IOS
      - MWEB

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: DEBUG
