server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"

    # Disable built-in YouTube, plugin handles it
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true

    oauth:
      enabled: true
      refreshToken: "${LAVALINK_YT_REFRESH_TOKEN}"

    # Use remote cipher (fixes "must find sig function" / signature breakages)
    remoteCipher:
      url: "https://cipher.kikkia.dev/"

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Prefer OAuth-capable clients first
    clients:
      - TVHTML5EMBEDDED
      - TV
      - WEB
      - WEBEMBEDDED
      - IOS

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: DEBUG