server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # IMPORTANT: try these first (and avoid WEBEMBEDDED being primary)
    clients:
      - MWEB
      - WEB
      - ANDROID_VR
      - IOS
      # keep WEBEMBEDDED last or remove it entirely:
      - WEBEMBEDDED
