server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"

    # Disable built-in YouTube, plugin handles it
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true

    # OAuth REQUIRED on VPS/datacenter IPs
    oauth:
      enabled: true

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # OAuth-compatible clients FIRST
    # (ANDROID is the most reliable)
    clients:
      - ANDROID
      - WEB
      - IOS
      - MWEB

logging:
  level:
    root: INFO
    lavalink: INFO
