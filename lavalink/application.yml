server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true

    oauth:
      enabled: true
      refreshToken: "${LAVALINK_YT_REFRESH_TOKEN}"

    remoteCipher:
      url: "https://cipher.kikkia.dev/"

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - WEB
      - TV

    clientOptions:
      WEB:
        playback: false
        videoLoading: true
        searching: true
        playlistLoading: true

      TV:
        playback: true
        videoLoading: false
        searching: false
        playlistLoading: false

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: DEBUG