server:
  port: 2333

lavalink:
  server:
    password: "youshallnotpass"

    # Disable built-in YouTube, plugin handles it
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.16.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true

    oauth:
      enabled: true
      refreshToken: ${LAVALINK_YT_REFRESH_TOKEN}

    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    clients:
      - TVHTML5EMBEDDED   # OAuth client (best choice)
      - TV                # OAuth client (fallback)
      - WEBEMBEDDED
      - WEB
      - MWEB
      - IOS
      - ANDROID
      - ANDROIDEMBEDDED

logging:
  level:
    root: INFO
    lavalink: INFO
    dev.lavalink.youtube: DEBUG
